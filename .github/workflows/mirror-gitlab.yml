# Espelha main do GitHub para GitLab a cada push.
#
# Documentação completa: docs/08-mirror-github-gitlab.md
#
# Secrets no GitHub (Settings → Secrets → Actions):
#   GITLAB_MIRROR_USER   — username do Project Access Token (ex.: project_83796735_bot)
#   GITLAB_MIRROR_TOKEN  — token gerado no projeto GitLab (scope write_repository)
#
# Criar token em:
# https://gitlab.com/mariahilmar-group/mgi-kpi-pipeline/-/settings/access_tokens

name: Mirror to GitLab

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: mirror-gitlab
  cancel-in-progress: true

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitLab
        env:
          GITLAB_MIRROR_USER: ${{ secrets.GITLAB_MIRROR_USER }}
          GITLAB_MIRROR_TOKEN: ${{ secrets.GITLAB_MIRROR_TOKEN }}
          GITLAB_MIRROR_URL: https://gitlab.com/mariahilmar-group/mgi-kpi-pipeline.git
        run: |
          set -euo pipefail

          if [ -z "${GITLAB_MIRROR_TOKEN:-}" ] || [ -z "${GITLAB_MIRROR_USER:-}" ]; then
            echo "::error::Defina GITLAB_MIRROR_USER e GITLAB_MIRROR_TOKEN em GitHub → Settings → Secrets → Actions."
            echo "Guia: docs/08-mirror-github-gitlab.md"
            exit 1
          fi

          TOKEN_ENCODED=$(python3 -c "import os, urllib.parse; print(urllib.parse.quote(os.environ['GITLAB_MIRROR_TOKEN'], safe=''))")
          REMOTE="https://${GITLAB_MIRROR_USER}:${TOKEN_ENCODED}@gitlab.com/mariahilmar-group/mgi-kpi-pipeline.git"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          echo "Testando autenticação no GitLab..."
          if ! git ls-remote "${REMOTE}" HEAD >/dev/null 2>&1; then
            echo "::error::Falha de autenticação no GitLab (HTTP Basic: Access denied)."
            echo "Renove o Project Access Token e atualize GITLAB_MIRROR_USER / GITLAB_MIRROR_TOKEN."
            echo "Guia: docs/08-mirror-github-gitlab.md"
            exit 1
          fi

          echo "Espelhando HEAD → refs/heads/main no GitLab..."
          if git push "${REMOTE}" "HEAD:refs/heads/main"; then
            echo "Mirror concluído com sucesso."
            exit 0
          fi

          echo "::warning::Push rejeitado (possível divergência de histórico). Tentando --force-with-lease..."
          git push --force-with-lease "${REMOTE}" "HEAD:refs/heads/main"
