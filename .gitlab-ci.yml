# CI do mgi-kpi-pipeline — roda a suíte de testes (pytest) a cada push / MR.
# pywin32 é marcado como win32-only no requirements, então é ignorado no Linux do runner.

stages:
  - test

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/pip

pytest:
  stage: test
  image: python:3.12-slim
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements-dev.txt
  script:
    - pytest
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
