# CI legado (GitLab) — referência histórica
#
# O fluxo principal de CI está em `.github/workflows/tests.yml` (GitHub Actions).
# Este arquivo pode ser copiado para a raiz como `.gitlab-ci.yml` em forks GitLab.

stages:
  - test

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .cache/pip

pytest:
  stage: test
  image: python:3.12-slim
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements-dev.txt
  script:
    - ruff check .
    - pytest
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
